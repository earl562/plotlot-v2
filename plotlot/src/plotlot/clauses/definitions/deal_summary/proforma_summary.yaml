id: deal_summary.proforma_summary
category: financial_terms
title: "Land Pro Forma (Residual Valuation)"
document_types: [deal_summary]
order_weight: 310
is_required: false
condition_expr: "context.max_land_price > 0"
source: "PlotLot custom"
formatting:
  heading_level: 2
  style: table
  columns: ["Metric", "Value"]
content_template: |
  Gross Development Value | {{ context.gross_development_value|currency }}
  Hard Costs | {{ context.hard_costs|currency }}
  Soft Costs | {{ context.soft_costs|currency }}
  Builder Margin | {{ context.builder_margin|currency }}
  Max Land Price (Residual) | {{ context.max_land_price|currency }}
  Cost per Door | {{ context.cost_per_door|currency }}
  ADV per Unit | {{ context.adv_per_unit|currency }}
