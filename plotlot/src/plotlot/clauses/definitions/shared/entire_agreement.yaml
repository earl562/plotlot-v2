  This Contract, together with all addenda, exhibits, and schedules attached hereto, constitutes the entire agreement between the parties with respect to the subject matter hereof. All prior negotiations, representations, warranties, and understandings are superseded by this Contract. This Contract may not be amended except by a written instrument signed by both Buyer and Seller.
