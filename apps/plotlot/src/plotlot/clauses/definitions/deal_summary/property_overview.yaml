id: deal_summary.property_overview
category: property_definition
title: "Property Overview"
document_types: [deal_summary]
order_weight: 200
is_required: true
source: "PlotLot custom"
formatting:
  heading_level: 2
  style: table
  columns: ["Field", "Value"]
content_template: |
  Address | {{ context.property_address or context.formatted_address or '[ADDRESS]' }}
  Municipality | {{ context.municipality or 'N/A' }}
  County | {{ context.county or 'N/A' }} County
  APN/Folio | {{ context.apn or 'N/A' }}
  Lot Size | {{ context.lot_size_sqft|comma }} sqft
  Year Built | {{ context.year_built or 'N/A' }}
  Owner | {{ context.owner or 'N/A' }}
