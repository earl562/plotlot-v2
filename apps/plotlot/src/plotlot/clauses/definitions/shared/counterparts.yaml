source: "SubTo Purchase Contract Section 14.6"
content_template: |
  This Contract may be executed in any number of counterparts, each of which shall be deemed an original and all of which together shall constitute one and the same instrument. Electronic signatures and PDF copies shall be deemed original signatures for all purposes.
