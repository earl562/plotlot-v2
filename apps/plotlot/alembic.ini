# Alembic configuration for PlotLot
#
# Uses async SQLAlchemy with asyncpg driver.
# The actual database URL is loaded from plotlot.config.settings in env.py,
# so the sqlalchemy.url here is just a placeholder.

[alembic]
script_location = alembic
prepend_sys_path = .

# Placeholder — overridden in env.py from plotlot.config.settings.database_url
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
