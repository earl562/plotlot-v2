services:
  - type: web
    name: plotlot-api
    runtime: docker
    dockerfilePath: ./plotlot/Dockerfile
    dockerContext: ./plotlot
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEOCODIO_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: NVIDIA_MODEL
        value: nvidia/llama-3.3-nemotron-super-49b-v1.5
      - key: NVIDIA_FALLBACK_MODEL
        value: minimaxai/minimax-m2.5
      - key: JINA_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: '["https://mlopprojects.vercel.app","https://plotlot-v2.vercel.app","http://localhost:3000"]'
