name: Eval

on:
  workflow_dispatch:
    inputs:
      run_live_provider_checks:
        description: Run live provider validation against external municipal/property endpoints
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: eval-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline-eval:
    name: Offline Eval
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: plotlot
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: "3.12"
          working-directory: plotlot
      - run: uv sync --frozen --extra dev --extra eval
      - run: uv run python -m pytest tests/eval/test_eval_scorers.py -v --tb=short
      - run: uv run python -m pytest tests/eval/test_eval_offline.py -v --tb=short

  live-provider-checks:
    name: Live Provider Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: inputs.run_live_provider_checks
    defaults:
      run:
        working-directory: plotlot
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: "3.12"
          working-directory: plotlot
      - run: uv sync --frozen --extra dev --extra eval
      - run: uv run python -m pytest tests/integration/test_hub_live.py tests/integration/test_universal_validation.py -m live -v --tb=short
