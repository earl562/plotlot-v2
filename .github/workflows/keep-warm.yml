name: Keep Warm

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://plotlot-api.onrender.com/health || true)
          echo "Health check response: $response"
          if [ "$response" != "200" ]; then
            echo "::warning::Health check returned $response (cold start expected)"
          fi
